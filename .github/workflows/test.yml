name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-tests:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: ./scripts/run-tests.sh

  shell-and-release:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: bash -n scripts/*.sh scripts/sanlight-gateway
      - run: scripts/release-archive.sh 0.2.0-ci
      - run: tar -tzf dist/sanlight-mesh-mqtt-gateway-0.2.0-ci.tar.gz | head -n 20
