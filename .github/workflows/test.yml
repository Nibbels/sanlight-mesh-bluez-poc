name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-tests:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run offline safety tests
        run: bash scripts/run-tests.sh

  shell-and-release:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check shell syntax
        run: bash -n scripts/*.sh scripts/sanlight-gateway
      - name: Build release archive
        run: bash scripts/release-archive.sh 0.2.0-ci
      - name: Verify release checksum
        run: cd dist && sha256sum -c sanlight-mesh-mqtt-gateway-0.2.0-ci.tar.gz.sha256
      - name: Test extracted release archive
        run: |
          temporary="$(mktemp -d)"
          trap 'rm -rf "$temporary"' EXIT
          tar -xzf dist/sanlight-mesh-mqtt-gateway-0.2.0-ci.tar.gz -C "$temporary"
          cd "$temporary/sanlight-mesh-mqtt-gateway-0.2.0-ci"
          bash scripts/run-tests.sh
